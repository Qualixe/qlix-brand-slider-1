			--qlix-scrolling-brand-wrap-shadow: 0px 3px 12px #e6e6e6;

			--qlix-brand-scroll-speed: 20s;

			--qlix-scrolling-brand-img-w: fit-content;
			--qlix-scrolling-brand-img-h: 24px;
		}

				--qlix-scrolling-brand-img-h: 16px;
			}

		/* marque slider css start */
		.qlix-scrolling-brand-section {
			padding-top: var(--qlix-scrolling-brand-section-pt);
			padding-bottom: var(--qlix-scrolling-brand-section-pb);
			background: var(--qlix-scrolling-brand-section-bg);
		}

		.qlix-scrolling-brand-slider {
			display: flex;
			overflow: hidden;
			user-select: none;
			gap: var(--qlix-scrolling-brand-content-item-gap);
		}

		.qlix-scrolling-brand-wrap {
			background: var(--qlix-scrolling-brand-wrap-bg);
			padding-top: var(--qlix-scrolling-brand-wrap-pt);
			padding-bottom: var(--qlix-scrolling-brand-wrap-pb);
			box-shadow: var(--qlix-scrolling-brand-wrap-shadow);
		}

		.qlix-scrolling-brand-content {
			flex-shrink: 0;
			display: flex;
			justify-content: space-around;
			align-items: center;
			gap: var(--qlix-scrolling-brand-content-item-gap);
			min-width: 100%;
			list-style-type: none;
		}

		.qlix-scrolling-brand-content.normal {
			animation: qlix_brand_scroll_normal var(--qlix-brand-scroll-speed) linear infinite;
		}

		@keyframes qlix_brand_scroll_normal {
			from {
				transform: translateX(0);
			}

			to {
				transform: translateX(calc(-100% - var(--qlix-scrolling-brand-content-item-gap)));
			}
		}

		.qlix-scrolling-brand-content.reverse {
			animation: qlix_brand_scroll_reverse var(--qlix-brand-scroll-speed) linear infinite;
		}

		@keyframes qlix_brand_scroll_reverse {
			from {
				transform: translateX(-100%);
			}

			to {
				transform: translateX(calc(0 - var(--qlix-scrolling-brand-content-item-gap)));
			}
		}

		.qlix-scrolling-brand-content>* {
			flex: 0 0 auto;
			text-align: center;
		}

		.qlix-scrolling-brand-hover-pause:hover .qlix-scrolling-brand-content {
			animation-play-state: paused;
		}

		.qlix-scrolling-brand-content-item {

			align-items: center;
			justify-content: center
		}

			height: 100%;
